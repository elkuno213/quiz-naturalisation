<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Naturalisation Française</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<script>
// Apply saved theme immediately to prevent FOUC
(function() {
  try {
    var saved = localStorage.getItem('quiz_theme');
    if (saved === 'dark') document.documentElement.classList.add('dark-theme');
    else if (saved === 'light') document.documentElement.classList.add('light-theme');
  } catch(e) { /* localStorage unavailable */ }
})();
</script>
<style>
/* --- CSS Custom Properties --- */
:root {
  --color-bg: hsl(0, 0%, 100%);
  --color-text: hsl(0, 0%, 0%);
  --color-text-muted: #999;
  --color-text-faint: #b7b7b7;
  --color-border: #e0e0e0;
  --color-surface: #fafafa;
  --color-brand: #20609f;
  --color-brand-hover: #1b5080;
  --color-brand-bg: hsl(197, 37%, 96%);
  --color-progress-bg: #e0e0e0;
  --color-correct-bg: #d1fae5;
  --color-correct-border: #059669;
  --color-correct-text: #065f46;
  --color-wrong-bg: #fee2e2;
  --color-wrong-border: #dc2626;
  --color-wrong-text: #991b1b;
  --color-ok-bg: #fef3c7;
  --color-ok-text: #92400e;
  --color-explanation-bg: hsl(197, 37%, 96%);
  --color-explanation-text: #444;
}

/* Dark theme variables */
:root.dark-theme {
  --color-bg: hsl(226, 23%, 11%);
  --color-text: #bcbdd0;
  --color-text-muted: #7e818d;
  --color-text-faint: #505468;
  --color-border: hsl(226, 13%, 22%);
  --color-surface: hsl(226, 15%, 17%);
  --color-brand: #2b79a2;
  --color-brand-hover: #3690bf;
  --color-brand-bg: hsla(199, 59%, 40%, 0.15);
  --color-progress-bg: hsl(226, 13%, 22%);
  --color-correct-bg: hsla(160, 60%, 30%, 0.3);
  --color-correct-border: #34d399;
  --color-correct-text: #6ee7b7;
  --color-wrong-bg: hsla(0, 60%, 30%, 0.3);
  --color-wrong-border: #f87171;
  --color-wrong-text: #fca5a5;
  --color-ok-bg: hsla(45, 60%, 30%, 0.3);
  --color-ok-text: #fbbf24;
  --color-explanation-bg: hsl(226, 15%, 17%);
  --color-explanation-text: #7e818d;
}

@media (prefers-color-scheme: dark) {
  :root:not(.light-theme) {
    --color-bg: hsl(226, 23%, 11%);
    --color-text: #bcbdd0;
    --color-text-muted: #7e818d;
    --color-text-faint: #505468;
    --color-border: hsl(226, 13%, 22%);
    --color-surface: hsl(226, 15%, 17%);
    --color-brand: #2b79a2;
    --color-brand-hover: #3690bf;
    --color-brand-bg: hsla(199, 59%, 40%, 0.15);
    --color-progress-bg: hsl(226, 13%, 22%);
    --color-correct-bg: hsla(160, 60%, 30%, 0.3);
    --color-correct-border: #34d399;
    --color-correct-text: #6ee7b7;
    --color-wrong-bg: hsla(0, 60%, 30%, 0.3);
    --color-wrong-border: #f87171;
    --color-wrong-text: #fca5a5;
    --color-ok-bg: hsla(45, 60%, 30%, 0.3);
    --color-ok-text: #fbbf24;
    --color-explanation-bg: hsl(226, 15%, 17%);
    --color-explanation-text: #7e818d;
  }
}

/* --- Reset & Base --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 62.5%; }

body {
  font-family: "Open Sans", sans-serif;
  font-size: 1.6rem;
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.45;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  padding: 2.4rem 1.6rem;
}

#app {
  width: 100%;
  max-width: 700px;
}

/* --- Accessibility --- */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}

button:focus-visible, input:focus-visible {
  outline: 2px solid var(--color-brand);
  outline-offset: 2px;
}

/* --- Theme toggle --- */
.theme-toggle {
  position: fixed;
  top: 1.2rem;
  right: 1.2rem;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  width: 4.4rem;
  height: 4.4rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  color: var(--color-text-muted);
  transition: border-color 0.15s, color 0.15s;
  z-index: 100;
  padding: 0;
  line-height: 1;
}
@media (hover: hover) {
  .theme-toggle:hover {
    border-color: var(--color-brand);
    color: var(--color-brand);
  }
}

/* --- Start screen --- */
.start {
  text-align: center;
  padding-top: 10vh;
}
.start h1 {
  font-size: 2.8rem;
  font-weight: 700;
  margin-bottom: 0.8rem;
}
.start p {
  color: var(--color-text-muted);
  margin-bottom: 3.2rem;
  font-size: 1.6rem;
}

/* Resume banner */
.resume-banner {
  background: var(--color-explanation-bg);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 1.4rem 1.6rem;
  margin-bottom: 2.4rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  font-size: 1.4rem;
}
.abandon-banner {
  background: var(--color-wrong-bg);
  border: 1px solid var(--color-wrong-border);
  border-radius: 4px;
  padding: 1.4rem 1.6rem;
  margin-top: 1.2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  font-size: 1.4rem;
}

/* Theme filters */
.theme-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  justify-content: center;
  margin-bottom: 2.4rem;
}
.theme-btn {
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  border-radius: 4px;
  padding: 0.6rem 1.4rem;
  font-size: 1.3rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: var(--color-text);
}
.theme-btn.active {
  border-color: var(--color-brand);
  background: var(--color-brand-bg);
  color: var(--color-brand);
}

/* Size row */
.size-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  flex-wrap: wrap;
  margin-bottom: 2.4rem;
}
.size-row label {
  font-size: 1.5rem;
  color: var(--color-text-muted);
}
.size-input {
  width: 7.2rem;
  text-align: center;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 1rem 0.8rem;
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--color-text);
  background: var(--color-surface);
  outline: none;
  transition: border-color 0.15s;
}
.size-input:focus { border-color: var(--color-brand); }
.size-presets {
  display: flex;
  gap: 0.6rem;
}
.preset-btn {
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  border-radius: 4px;
  padding: 0.8rem 1.4rem;
  font-size: 1.4rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: var(--color-text);
}
@media (hover: hover) {
  .preset-btn:hover {
    border-color: var(--color-brand);
    background: var(--color-brand-bg);
  }
}
.preset-btn.active {
  border-color: var(--color-brand);
  background: var(--color-brand-bg);
}

/* Buttons */
.btn-primary {
  background: var(--color-brand);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 1.4rem 3.6rem;
  font-size: 1.6rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
@media (hover: hover) {
  .btn-primary:hover { background: var(--color-brand-hover); }
}
.btn-primary:disabled {
  background: var(--color-border);
  cursor: not-allowed;
}
.btn-secondary {
  background: var(--color-surface);
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 1rem 2rem;
  font-size: 1.4rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s;
}
@media (hover: hover) {
  .btn-secondary:hover { border-color: var(--color-brand); }
}
.btn-sm { padding: 0.8rem 1.6rem; font-size: 1.4rem; }

/* History */
.history-section {
  margin-top: 3.2rem;
  text-align: left;
}
.history-section h3 {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 0.8rem;
  color: var(--color-text-muted);
}
.history-item {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 1.2rem;
  align-items: baseline;
  padding: 0.8rem 0;
  font-size: 1.4rem;
  border-bottom: 1px solid var(--color-border);
}
.history-score {
  text-align: right;
  white-space: nowrap;
}
.history-pct {
  text-align: right;
  font-weight: 600;
  min-width: 3.5em;
  white-space: nowrap;
}
.history-retry {
  color: var(--color-text-faint);
  font-size: 1.2rem;
}

/* --- Progress bar --- */
.progress-bar {
  background: var(--color-progress-bg);
  border-radius: 2px;
  height: 4px;
  margin-bottom: 2.4rem;
  overflow: hidden;
}
.progress-fill {
  background: var(--color-brand);
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* --- Question card --- */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 3rem 2.4rem;
  margin-bottom: 1.6rem;
}
.q-meta {
  font-size: 1.3rem;
  color: var(--color-text-faint);
  margin-bottom: 0.6rem;
}
.q-text {
  font-size: 1.8rem;
  font-weight: 600;
  margin-bottom: 2rem;
  line-height: 1.45;
}
.options {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.option-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 1.4rem 1.6rem;
  font-size: 1.5rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: var(--color-text);
  line-height: 1.4;
}
.option-btn::before {
  content: '';
  display: inline-block;
  width: 0;
  overflow: hidden;
  font-weight: 700;
  vertical-align: middle;
  transition: width 0.15s ease, margin-right 0.15s ease;
}
.option-btn.correct::before,
.option-btn.wrong::before {
  width: 2rem;
  margin-right: 0.6rem;
}
.option-btn.correct::before {
  content: '\2713';
  color: var(--color-correct-text);
}
.option-btn.wrong::before {
  content: '\2717';
  color: var(--color-wrong-text);
}
@media (hover: hover) {
  .option-btn:hover:not(:disabled) {
    border-color: var(--color-brand);
    background: var(--color-brand-bg);
  }
}
.option-btn:disabled {
  cursor: default;
  opacity: 1;
}
.option-btn.correct {
  background: var(--color-correct-bg);
  border-color: var(--color-correct-border);
}
.option-btn.wrong {
  background: var(--color-wrong-bg);
  border-color: var(--color-wrong-border);
}
.explanation {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  padding-top: 0;
  padding-bottom: 0;
  padding-left: 1.4rem;
  padding-right: 1.4rem;
  margin-top: 0;
  background: var(--color-explanation-bg);
  border-radius: 4px;
  font-size: 1.4rem;
  color: var(--color-explanation-text);
  transition: max-height 0.3s ease, opacity 0.2s ease, padding 0.3s ease, margin-top 0.3s ease;
}
.explanation.visible {
  max-height: 50rem;
  opacity: 1;
  padding-top: 1.2rem;
  padding-bottom: 1.2rem;
  margin-top: 1.4rem;
}

/* Nav row */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.8rem;
}
.btn-reset {
  background: none;
  border: none;
  color: var(--color-text-faint);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 1.2rem 1.6rem;
  min-height: 4.4rem;
  transition: color 0.15s;
}
@media (hover: hover) {
  .btn-reset:hover { color: var(--color-wrong-border); }
}

/* --- Results --- */
.results-header {
  text-align: center;
  padding: 3.2rem 0 2.4rem;
}
.results-header h2 {
  font-size: 2.4rem;
  margin-bottom: 0.8rem;
}
.score-big {
  font-size: 4.8rem;
  font-weight: 700;
  color: var(--color-brand);
}
.score-pct {
  font-size: 1.6rem;
  color: var(--color-text-muted);
  margin-bottom: 1.2rem;
}

/* Verdict */
.verdict {
  font-size: 1.6rem;
  font-weight: 600;
  margin-bottom: 2.4rem;
  padding: 1rem 1.6rem;
  border-radius: 4px;
  display: inline-block;
}
.verdict-fail { background: var(--color-wrong-bg); color: var(--color-wrong-text); }
.verdict-ok { background: var(--color-ok-bg); color: var(--color-ok-text); }
.verdict-pass { background: var(--color-correct-bg); color: var(--color-correct-text); }

/* Theme breakdown table */
.theme-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 2.4rem;
  font-size: 1.4rem;
}
.theme-table th, .theme-table td {
  padding: 0.8rem 1.2rem;
  text-align: left;
  border-bottom: 1px solid var(--color-border);
}
.theme-table th {
  font-weight: 600;
  color: var(--color-text-muted);
  font-size: 1.3rem;
}
.theme-table td:nth-child(2),
.theme-table th:nth-child(2) {
  text-align: center;
  white-space: nowrap;
}
.theme-table td:last-child,
.theme-table th:last-child {
  text-align: right;
  font-weight: 600;
  white-space: nowrap;
}

/* Review */
.review-item {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 2rem;
  margin-bottom: 1.2rem;
}
.review-item .q-num {
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--color-text-faint);
  margin-bottom: 0.4rem;
}
.review-item .q-text {
  font-size: 1.6rem;
  margin-bottom: 1.2rem;
}
.review-answer {
  font-size: 1.4rem;
  padding: 0.6rem 1rem;
  border-radius: 4px;
  margin-bottom: 0.4rem;
}
.review-answer.user-correct {
  background: var(--color-correct-bg);
  color: var(--color-correct-text);
}
.review-answer.user-wrong {
  background: var(--color-wrong-bg);
  color: var(--color-wrong-text);
}
.review-answer.show-correct {
  background: var(--color-correct-bg);
  color: var(--color-correct-text);
}
.review-explanation {
  font-size: 1.4rem;
  color: var(--color-text-muted);
  margin-top: 0.8rem;
  padding: 0.8rem 1rem;
  background: var(--color-explanation-bg);
  border-radius: 4px;
}
.restart-row {
  text-align: center;
  padding: 2.4rem 0 4.8rem;
  display: flex;
  gap: 1.2rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* --- Interview Mode --- */
.mode-row {
  display: flex;
  gap: 1.2rem;
  justify-content: center;
  margin-bottom: 2.4rem;
}
.interview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2.4rem;
}
.interview-header h2 {
  font-size: 2rem;
  font-weight: 700;
}
.interview-categories {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  margin-bottom: 2rem;
}
.cat-btn {
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  border-radius: 4px;
  padding: 0.6rem 1.2rem;
  font-size: 1.3rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: var(--color-text);
}
.cat-btn.active {
  border-color: var(--color-brand);
  background: var(--color-brand-bg);
  color: var(--color-brand);
}
.interview-progress {
  font-size: 1.4rem;
  color: var(--color-text-muted);
  margin-bottom: 1.6rem;
}
.flashcard {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 2.4rem;
  margin-bottom: 1.6rem;
  min-height: 20rem;
}
.flashcard-category {
  font-size: 1.2rem;
  color: var(--color-text-faint);
  margin-bottom: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.flashcard-question {
  font-size: 1.8rem;
  font-weight: 600;
  margin-bottom: 2rem;
  line-height: 1.45;
}
.flashcard-answer {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.2s ease, padding 0.3s ease;
  background: var(--color-explanation-bg);
  border-radius: 4px;
  padding: 0 1.4rem;
}
.flashcard-answer.visible {
  max-height: 200rem;
  opacity: 1;
  padding: 1.4rem;
}
.flashcard-answer h4 {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--color-text-muted);
  margin-bottom: 0.8rem;
}
.flashcard-answer ul {
  margin: 0;
  padding-left: 2rem;
  font-size: 1.4rem;
  color: var(--color-explanation-text);
  line-height: 1.6;
}
.flashcard-answer li {
  margin-bottom: 0.4rem;
}
.flashcard-answer strong {
  color: var(--color-text);
}
.flashcard-answer .example-text {
  font-style: italic;
  color: var(--color-text);
  background: var(--color-brand-bg);
  padding: 1rem 1.2rem;
  border-radius: 6px;
  margin: 0.6rem 0;
  line-height: 1.7;
  font-size: 1.4rem;
}
.interview-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1rem;
}
.interview-nav button {
  flex: 1;
  max-width: 14rem;
  padding: 1.2rem 1.6rem;
  font-size: 1.5rem;
  font-weight: 600;
  text-align: center;
}

@media (max-width: 400px) {
  .size-row { flex-direction: column; }
  .size-presets { justify-content: center; }
  .nav-row { gap: 0.4rem; }
  .btn-reset { padding: 1.2rem 0.8rem; font-size: 1.3rem; }
}

.hidden { display: none !important; }
.btn-hidden { visibility: hidden; pointer-events: none; }
</style>
</head>
<body>
<button type="button" class="theme-toggle" id="theme-toggle" aria-label="Basculer le thème clair/sombre" title="Basculer le thème">
  <span id="theme-icon" aria-hidden="true"></span>
</button>
<main aria-label="Quiz Naturalisation Française">
<div id="app">

  <!-- START SCREEN -->
  <div id="screen-start" class="start">
    <div id="resume-banner" class="resume-banner hidden">
      <span>Un quiz en cours a été trouvé.</span>
      <button type="button" class="btn-primary btn-sm" id="btn-resume">Reprendre</button>
      <button type="button" class="btn-secondary btn-sm" id="btn-abandon">Nouveau quiz</button>
    </div>
    <h1 id="start-title" tabindex="-1">Quiz Naturalisation</h1>
    <p id="subtitle">96 QCM + 200 questions d'entretien</p>
    <div id="theme-filters" class="theme-filters"></div>
    <div class="size-row">
      <label for="size-input">Nombre de questions :</label>
      <input type="number" id="size-input" class="size-input" value="20" min="1" max="96">
      <div class="size-presets">
        <button type="button" class="preset-btn" data-n="10">10</button>
        <button type="button" class="preset-btn" data-n="20">20</button>
        <button type="button" class="preset-btn" data-n="30">30</button>
        <button type="button" class="preset-btn" data-n="all">Tout</button>
      </div>
    </div>
    <div class="mode-row">
      <button type="button" class="btn-primary" id="btn-start">Quiz QCM</button>
      <button type="button" class="btn-secondary" id="btn-interview-mode">Mode Entretien</button>
    </div>
    <div id="history-section" class="history-section hidden">
      <h3>Derniers résultats</h3>
      <div id="history-list"></div>
    </div>
  </div>

/* --- Shuffle (Fisher-Yates) --- */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* --- Helpers --- */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeGetItem(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}
function safeSetItem(key, value) {
  try { localStorage.setItem(key, value); } catch(e) { /* silent */ }
}
function safeRemoveItem(key) {
  try { localStorage.removeItem(key); } catch(e) { /* silent */ }
}

/* --- Constants --- */
const ALL_THEMES = [...new Set(QUESTIONS.map(q => q.theme))];

/* --- State --- */
let quizSize = 20;
let quizQuestions = [];

let answers = [];
let selectedThemes = new Set();
let isRetryMode = false;

/* --- DOM refs --- */
const $start     = document.getElementById('screen-start');
const $quiz      = document.getElementById('screen-quiz');
const $results   = document.getElementById('screen-results');
const $progress  = document.getElementById('progress');
const $meta      = document.getElementById('q-meta');
const $text      = document.getElementById('q-text');
const $options   = document.getElementById('q-options');
const $expl      = document.getElementById('q-explanation');
const $next      = document.getElementById('btn-next');
const $back      = document.getElementById('btn-back');

const $srStatus  = document.getElementById('sr-status');

/* --- ARIA live announcements --- */
function announce(msg) {
  $srStatus.textContent = '';
  requestAnimationFrame(() => { $srStatus.textContent = msg; });
}

/* --- Theme filtering --- */
function getFilteredQuestions() {
  if (selectedThemes.size === 0) return QUESTIONS;
  return QUESTIONS.filter(q => selectedThemes.has(q.theme));
}

function isThemeActive(theme) {
  return selectedThemes.size === 0 || selectedThemes.has(theme);
}

function toggleTheme(theme) {
  if (selectedThemes.size === 0) {
    ALL_THEMES.forEach(t => { if (t !== theme) selectedThemes.add(t); });
  } else if (selectedThemes.has(theme)) {
    selectedThemes.delete(theme);
  } else {
    selectedThemes.add(theme);
    if (selectedThemes.size === ALL_THEMES.length) selectedThemes.clear();
  }
  updateThemeUI();
}

function renderThemeFilters() {
  const $filters = document.getElementById('theme-filters');
  $filters.innerHTML = '';
  ALL_THEMES.forEach(theme => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'theme-btn' + (isThemeActive(theme) ? ' active' : '');
    btn.textContent = theme;
    btn.dataset.theme = theme;
    btn.setAttribute('aria-pressed', isThemeActive(theme));
    btn.addEventListener('click', () => toggleTheme(theme));
    $filters.appendChild(btn);
  });
  updateThemeUI();
}

function updateThemeUI() {
  document.querySelectorAll('.theme-btn').forEach(btn => {
    const active = isThemeActive(btn.dataset.theme);
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active);
  });
  const pool = getFilteredQuestions();
  const maxN = pool.length;
  $sizeInput.max = maxN;
  if (parseInt($sizeInput.value) > maxN) $sizeInput.value = maxN;
  $subtitle.textContent = maxN + ' questions — Livret du Citoyen';
}

/* --- Size input + presets --- */
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.n === 'all') {
      $sizeInput.value = parseInt($sizeInput.max);
    } else {
      const v = parseInt(btn.dataset.n);
      $sizeInput.value = Math.min(v, parseInt($sizeInput.max));
    }
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
  });
});

$sizeInput.addEventListener('input', () => {
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-pressed', 'false');
  });
});

/* --- Session persistence --- */
function saveSession() {
  const data = {
    version: 1,
    currentIdx,
    answers,
    selectedThemes: [...selectedThemes],
    isRetryMode,
    quizQuestions: quizQuestions.map(q => ({
      originalId: q.original.id,
      shuffledOptionIndices: q.shuffledOptions.map(opt => q.original.options.indexOf(opt)),
      correctShuffledIdx: q.correctShuffledIdx
    }))
  };
  safeSetItem('quiz_session', JSON.stringify(data));
}

function clearSession() {
  safeRemoveItem('quiz_session');
}

function checkResume() {
  try {
    const saved = safeGetItem('quiz_session');
    if (!saved) return;
    const data = JSON.parse(saved);
    if (data.version !== 1) return;
    $resumeBanner.classList.remove('hidden');
  } catch(e) { /* ignore */ }
}

function resumeQuiz() {
  try {
    const data = JSON.parse(safeGetItem('quiz_session'));
    selectedThemes = new Set(data.selectedThemes || []);
    isRetryMode = data.isRetryMode || false;
    currentIdx = data.currentIdx;
    answers = data.answers;
    quizQuestions = data.quizQuestions.map(sq => {
      const original = QUESTIONS.find(q => q.id === sq.originalId);
      return {
        original,
        shuffledOptions: sq.shuffledOptionIndices.map(i => original.options[i]),
        correctShuffledIdx: sq.correctShuffledIdx
      };
    });
    quizSize = quizQuestions.length;
    $sizeInput.value = quizSize;
    $resumeBanner.classList.add('hidden');
    $start.classList.add('hidden');
    $quiz.classList.remove('hidden');
    showQuestion();
  } catch(e) {
    clearSession();
    $resumeBanner.classList.add('hidden');
  }
}

/* --- Score history --- */
function saveHistory(correct, total, pct) {
  let history = { version: 1, entries: [] };
  try {
    const saved = safeGetItem('quiz_history');
    if (saved) history = JSON.parse(saved);
  } catch(e) { /* ignore */ }
  history.entries.push({
    date: new Date().toISOString(),
    correct, total, pct,
    themes: selectedThemes.size === 0 ? 'all' : [...selectedThemes],
    isRetry: isRetryMode
  });
  if (history.entries.length > 10) history.entries = history.entries.slice(-10);
  safeSetItem('quiz_history', JSON.stringify(history));
}

function renderHistory() {
  const $section = document.getElementById('history-section');
  const $list = document.getElementById('history-list');
  try {
    const saved = safeGetItem('quiz_history');
    if (!saved) { $section.classList.add('hidden'); return; }
    const history = JSON.parse(saved);
    if (!history.entries || history.entries.length === 0) { $section.classList.add('hidden'); return; }
    const last5 = history.entries.slice(-5).reverse();
    $list.innerHTML = last5.map(e => {
      const d = new Date(e.date);
      const dateStr = d.toLocaleDateString('fr-FR');
      const retryTag = e.isRetry ? ' <span class="history-retry">(révision)</span>' : '';
      return '<div class="history-item">' +
        '<span>' + dateStr + retryTag + '</span>' +
        '<span class="history-score">' + e.correct + '/' + e.total + '</span>' +
        '<span class="history-pct">' + e.pct + '\u202f%</span>' +
        '</div>';
    }).join('');
    $section.classList.remove('hidden');
  } catch(e) { $section.classList.add('hidden'); }
}

/* --- Navigation --- */
function goToStart() {
  $quiz.classList.add('hidden');
  $results.classList.add('hidden');
  $start.classList.remove('hidden');
  isRetryMode = false;
  clearSession();
  renderHistory();
  updateThemeUI();
  requestAnimationFrame(() => document.getElementById('start-title').focus());
}

function goBack() {
  if (currentIdx <= 0) return;
  currentIdx--;
  showQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* --- Start quiz --- */
document.getElementById('btn-start').addEventListener('click', startQuiz);
document.getElementById('btn-restart').addEventListener('click', goToStart);
const $abandonBanner = document.getElementById('abandon-banner');
function showAbandonBanner() {
  $abandonBanner.classList.remove('hidden');
  document.getElementById('btn-abandon-yes').focus();
}
function hideAbandonBanner() {
  $abandonBanner.classList.add('hidden');
}
document.getElementById('btn-reset').addEventListener('click', showAbandonBanner);
document.getElementById('btn-abandon-yes').addEventListener('click', () => {
  hideAbandonBanner();
  goToStart();
});
document.getElementById('btn-abandon-no').addEventListener('click', hideAbandonBanner);
document.getElementById('btn-resume').addEventListener('click', resumeQuiz);
document.getElementById('btn-abandon').addEventListener('click', () => {
  clearSession();
  $resumeBanner.classList.add('hidden');
});
$back.addEventListener('click', goBack);

function startQuiz() {
  const pool = getFilteredQuestions();
  quizSize = Math.max(1, Math.min(pool.length, parseInt($sizeInput.value) || 20));
  $sizeInput.value = quizSize;
  isRetryMode = false;
  const picked = shuffle(pool).slice(0, quizSize);
  quizQuestions = picked.map(q => {
    const indices = shuffle([0, 1, 2, 3]);
    return {
      original: q,
      shuffledOptions: indices.map(i => q.options[i]),
      correctShuffledIdx: indices.indexOf(q.correct)
    };
  });
  currentIdx = 0;
  answers = new Array(quizQuestions.length).fill(-1);
  clearSession();
  $resumeBanner.classList.add('hidden');
  $start.classList.add('hidden');
  $quiz.classList.remove('hidden');
  showQuestion();
}

/* --- Show question --- */
function showQuestion() {
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;
  hideAbandonBanner();

  /* Progress */
  const pct = ((currentIdx + 1) / total) * 100;
  $progress.style.width = pct + '%';
  const $bar = $progress.parentElement;
  $bar.setAttribute('aria-valuenow', currentIdx + 1);
  $bar.setAttribute('aria-valuemax', total);

  /* Meta & text */
  $meta.textContent = 'Question ' + (currentIdx + 1) + ' / ' + total + '  \u2014  ' + q.original.theme;
  $text.textContent = q.original.question;

  /* Explanation reset */
  $expl.classList.remove('visible');
  $expl.textContent = '';

  /* Back button */
  $back.classList.toggle('btn-hidden', currentIdx === 0);

  /* Build options */
  $options.innerHTML = '';
  q.shuffledOptions.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('type', 'button');
    btn.textContent = text;
    btn.addEventListener('click', () => selectAnswer(i));
    $options.appendChild(btn);
  });

  /* Already answered (back navigation or session restore) */
  if (answers[currentIdx] !== -1) {
    const userIdx = answers[currentIdx];
    const btns = $options.querySelectorAll('.option-btn');
    btns.forEach(b => { b.disabled = true; });

    if (userIdx === q.correctShuffledIdx) {
      btns[userIdx].classList.add('correct');
    } else {
      btns[userIdx].classList.add('wrong');
      btns[q.correctShuffledIdx].classList.add('correct');
    }

    if (q.original.explanation) {
      $expl.textContent = q.original.explanation;
      $expl.classList.add('visible');
    }

    $next.classList.remove('btn-hidden');
    $next.textContent = currentIdx < total - 1 ? 'Suivant' : 'Voir les résultats';
  } else {
    $next.classList.add('btn-hidden');
  }

  /* Scroll to top */
  window.scrollTo({ top: 0, behavior: 'smooth' });

  /* ARIA */
  announce('Question ' + (currentIdx + 1) + ' sur ' + total + '. ' + q.original.question);
}

/* --- Select answer --- */
function selectAnswer(idx) {
  if (answers[currentIdx] !== -1) return;
  const q = quizQuestions[currentIdx];
  answers[currentIdx] = idx;

  const btns = $options.querySelectorAll('.option-btn');
  btns.forEach(b => { b.disabled = true; });

  if (idx === q.correctShuffledIdx) {
    btns[idx].classList.add('correct');
    announce('Bonne réponse');
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correctShuffledIdx].classList.add('correct');
    announce('Mauvaise réponse. La bonne réponse est : ' + q.shuffledOptions[q.correctShuffledIdx]);
  }

  if (q.original.explanation) {
    $expl.textContent = q.original.explanation;
    $expl.classList.add('visible');
  }

  $next.classList.remove('btn-hidden');
  $next.textContent = currentIdx < quizQuestions.length - 1 ? 'Suivant' : 'Voir les résultats';

  /* Focus next button */
  requestAnimationFrame(() => $next.focus());

  /* Persist */
  saveSession();
}

/* --- Next / finish --- */
$next.addEventListener('click', () => {
  currentIdx++;
  if (currentIdx < quizQuestions.length) {
    showQuestion();
  } else {
    showResults();
  }
});

/* --- Retry wrong answers --- */
document.getElementById('btn-retry').addEventListener('click', startRetry);

function startRetry() {
  const wrongQs = quizQuestions.filter((q, i) => answers[i] !== q.correctShuffledIdx);
  isRetryMode = true;
  quizSize = wrongQs.length;
  quizQuestions = shuffle(wrongQs.map(q => {
    const indices = shuffle([0, 1, 2, 3]);
    return {
      original: q.original,
      shuffledOptions: indices.map(i => q.original.options[i]),
      correctShuffledIdx: indices.indexOf(q.original.correct)
    };
  }));
  currentIdx = 0;
  answers = new Array(quizQuestions.length).fill(-1);
  $results.classList.add('hidden');
  $quiz.classList.remove('hidden');
  showQuestion();
}

/* --- Results --- */
function showResults() {
  clearSession();
  $quiz.classList.add('hidden');
  $results.classList.remove('hidden');

  let correct = 0;
  const total = quizQuestions.length;
  const themeStats = {};
  const reviewHTML = [];

  quizQuestions.forEach((q, i) => {
    const userIdx = answers[i];
    const isCorrect = userIdx === q.correctShuffledIdx;
    if (isCorrect) correct++;

    /* Theme breakdown */
    const theme = q.original.theme;
    if (!themeStats[theme]) themeStats[theme] = { correct: 0, total: 0 };
    themeStats[theme].total++;
    if (isCorrect) themeStats[theme].correct++;

    /* Review list */
    const userAnswer = userIdx >= 0 ? q.shuffledOptions[userIdx] : '(pas de réponse)';
    const correctAnswer = q.shuffledOptions[q.correctShuffledIdx];

    let answerHTML;
    if (isCorrect) {
      answerHTML = '<div class="review-answer user-correct">&#10003; ' + esc(userAnswer) + '</div>';
    } else {
      answerHTML = '<div class="review-answer user-wrong">&#10007; ' + esc(userAnswer) + '</div>' +
                   '<div class="review-answer show-correct">&#10003; ' + esc(correctAnswer) + '</div>';
    }

    const explHTML = q.original.explanation
      ? '<div class="review-explanation">' + esc(q.original.explanation) + '</div>'
      : '';

    reviewHTML.push(
      '<div class="review-item">' +
        '<div class="q-num">Q' + q.original.id + ' \u2014 ' + esc(q.original.theme) + '</div>' +
        '<div class="q-text">' + esc(q.original.question) + '</div>' +
        answerHTML +
        explHTML +
      '</div>'
    );
  });

  /* Score */
  const pct = Math.round((correct / total) * 100);
  document.getElementById('score-big').textContent = correct + ' / ' + total;
  document.getElementById('score-pct').textContent = pct + ' %';

  /* Verdict */
  const $verdict = document.getElementById('verdict');
  let verdictText, verdictClass;
  if (pct < 60) {
    verdictText = 'Continuez \u00e0 r\u00e9viser';
    verdictClass = 'verdict verdict-fail';
  } else if (pct < 80) {
    verdictText = 'Bon d\u00e9but !';
    verdictClass = 'verdict verdict-ok';
  } else {
    verdictText = 'Pr\u00eat(e) pour l\u2019entretien !';
    verdictClass = 'verdict verdict-pass';
  }
  $verdict.textContent = verdictText;
  $verdict.className = verdictClass;

  /* Theme breakdown table */
  const $breakdown = document.getElementById('theme-breakdown');
  let tableHTML = '<table class="theme-table"><thead><tr>' +
    '<th>Th\u00e8me</th><th>Score</th><th>%</th>' +
    '</tr></thead><tbody>';
  for (const theme of Object.keys(themeStats)) {
    const s = themeStats[theme];
    const tp = Math.round((s.correct / s.total) * 100);
    tableHTML += '<tr><td>' + esc(theme) + '</td>' +
      '<td>' + s.correct + '/' + s.total + '</td>' +
      '<td>' + tp + ' %</td></tr>';
  }
  tableHTML += '</tbody></table>';
  $breakdown.innerHTML = tableHTML;

  /* Review list */
  document.getElementById('review-list').innerHTML = reviewHTML.join('');

  /* Retry button */
  const wrongCount = total - correct;
  const $retry = document.getElementById('btn-retry');
  if (wrongCount > 0) {
    $retry.textContent = 'R\u00e9viser les erreurs (' + wrongCount + ')';
    $retry.classList.remove('hidden');
  } else {
    $retry.classList.add('hidden');
  }

  /* Save to history */
  saveHistory(correct, total, pct);

  /* ARIA + focus */
  announce('R\u00e9sultat : ' + correct + ' sur ' + total + ', ' + pct + ' pour cent.');
  requestAnimationFrame(() => document.getElementById('results-title').focus());
}

/* --- Keyboard shortcuts --- */
document.addEventListener('keydown', e => {
  if ($quiz.classList.contains('hidden')) return;

  if (e.key >= '1' && e.key <= '4') {
    const idx = parseInt(e.key) - 1;
    const btns = $options.querySelectorAll('.option-btn');
    if (idx < btns.length && !btns[idx].disabled) {
      e.preventDefault();
      selectAnswer(idx);
    }
  } else if ((e.key === 'Enter' || e.key === ' ') && !$next.classList.contains('btn-hidden')) {
    e.preventDefault();
    $next.click();
  } else if (e.key === 'Escape') {
    if ($abandonBanner.classList.contains('hidden')) {
      showAbandonBanner();
    } else {
      hideAbandonBanner();
    }
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goBack();
  }
});

/* --- Theme toggle --- */
(function() {
  var toggle = document.getElementById('theme-toggle');
  var icon = document.getElementById('theme-icon');
  var root = document.documentElement;

  function isDark() {
    if (root.classList.contains('dark-theme')) return true;
    if (root.classList.contains('light-theme')) return false;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function updateIcon() {
    icon.textContent = isDark() ? '\u2600' : '\u263D';
  }

  toggle.addEventListener('click', function() {
    var dark = isDark();
    root.classList.remove('dark-theme', 'light-theme');
    if (dark) {
      root.classList.add('light-theme');
      safeSetItem('quiz_theme', 'light');
    } else {
      root.classList.add('dark-theme');
      safeSetItem('quiz_theme', 'dark');
    }
    updateIcon();
  });

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateIcon);
  updateIcon();
})();

const INTERVIEW_CATEGORIES = [...new Set(INTERVIEW_QUESTIONS.map(q => q.category))];
let interviewIdx = 0;
let interviewQuestions = [];
let selectedInterviewCategory = null;
let answerRevealed = false;

const $interview = document.getElementById('screen-interview');
const $flashcardCat = document.getElementById('flashcard-category');
const $flashcardQ = document.getElementById('flashcard-question');
const $flashcardA = document.getElementById('flashcard-answer');
const $interviewProgress = document.getElementById('interview-progress');
const $btnReveal = document.getElementById('btn-reveal');
const $btnInterviewPrev = document.getElementById('btn-interview-prev');
const $btnInterviewNext = document.getElementById('btn-interview-next');

function getFilteredInterviewQuestions() {
  if (!selectedInterviewCategory) return INTERVIEW_QUESTIONS;
  return INTERVIEW_QUESTIONS.filter(q => q.category === selectedInterviewCategory);
}

function renderInterviewCategories() {
  const $cats = document.getElementById('interview-categories');
  $cats.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.type = 'button';
  allBtn.className = 'cat-btn' + (!selectedInterviewCategory ? ' active' : '');
  allBtn.textContent = 'Toutes';
  allBtn.addEventListener('click', () => {
    selectedInterviewCategory = null;
    interviewIdx = 0;
    interviewQuestions = getFilteredInterviewQuestions();
    renderInterviewCategories();
    showInterviewQuestion();
  });
  $cats.appendChild(allBtn);

  INTERVIEW_CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat-btn' + (selectedInterviewCategory === cat ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      selectedInterviewCategory = cat;
      interviewIdx = 0;
      interviewQuestions = getFilteredInterviewQuestions();
      renderInterviewCategories();
      showInterviewQuestion();
    });
    $cats.appendChild(btn);
  });
}

function showInterviewQuestion() {
  if (interviewQuestions.length === 0) return;

  const q = interviewQuestions[interviewIdx];
  $flashcardCat.textContent = q.category;
  $flashcardQ.textContent = 'Q' + q.num + '. ' + q.question;

  let pointsHTML = '<h4>Points à aborder</h4><ul>' +
    q.points.map(p => '<li>' + p + '</li>').join('') + '</ul>';
  if (q.example) {
    pointsHTML += '<h4>Exemple de réponse</h4><p class="example-text">« ' +
      q.example.replace(/\n\n/g, ' </p><p class="example-text">') + ' »</p>';
  }
  $flashcardA.innerHTML = pointsHTML;

  answerRevealed = false;
  $flashcardA.classList.remove('visible');
  $btnReveal.textContent = 'Voir les points clés';
  $btnReveal.classList.remove('hidden');

  $interviewProgress.textContent = 'Question ' + (interviewIdx + 1) + ' / ' + interviewQuestions.length;

  $btnInterviewPrev.classList.toggle('btn-hidden', interviewIdx === 0);
  $btnInterviewNext.textContent = interviewIdx < interviewQuestions.length - 1 ? 'Suivant →' : 'Recommencer';

  announce('Question ' + (interviewIdx + 1) + ' sur ' + interviewQuestions.length + '. ' + q.question);
}

function revealAnswer() {
  if (answerRevealed) {
    $flashcardA.classList.remove('visible');
    $btnReveal.textContent = 'Voir les points clés';
    answerRevealed = false;
  } else {
    $flashcardA.classList.add('visible');
    $btnReveal.textContent = 'Masquer';
    answerRevealed = true;
  }
}

function goToInterview() {
  $start.classList.add('hidden');
  $quiz.classList.add('hidden');
  $results.classList.add('hidden');
  $interview.classList.remove('hidden');

  selectedInterviewCategory = null;
  interviewIdx = 0;
  interviewQuestions = INTERVIEW_QUESTIONS.slice();

  renderInterviewCategories();
  showInterviewQuestion();

  requestAnimationFrame(() => document.getElementById('interview-title').focus());
}

function leaveInterview() {
  $interview.classList.add('hidden');
  $start.classList.remove('hidden');
  requestAnimationFrame(() => document.getElementById('start-title').focus());
}

document.getElementById('btn-interview-mode').addEventListener('click', goToInterview);
document.getElementById('btn-interview-back').addEventListener('click', leaveInterview);
$btnReveal.addEventListener('click', revealAnswer);

$btnInterviewPrev.addEventListener('click', () => {
  if (interviewIdx > 0) {
    interviewIdx--;
    showInterviewQuestion();
  }
});

$btnInterviewNext.addEventListener('click', () => {
  if (interviewIdx < interviewQuestions.length - 1) {
    interviewIdx++;
    showInterviewQuestion();
  } else {
    interviewIdx = 0;
    interviewQuestions = getFilteredInterviewQuestions();
    showInterviewQuestion();
  }
});

/* Keyboard shortcuts for interview mode */
document.addEventListener('keydown', e => {
  if ($interview.classList.contains('hidden')) return;

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    revealAnswer();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    $btnInterviewNext.click();
  } else if (e.key === 'ArrowLeft' && interviewIdx > 0) {
    e.preventDefault();
    $btnInterviewPrev.click();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    leaveInterview();
  }
});

checkResume();
renderHistory();
renderThemeFilters();
</script>
